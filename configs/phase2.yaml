# Phase 2 Configuration
# Extended benchmark with 4-5 datasets across multiple modalities
# Includes optional Phase 2 noises and grid search

exp:
  name: "phase2_multi_modality"
  out_root: "outputs"

device: "cuda"
seed: 42
limit_n: 0       # 0 = all samples
dry_run: false

phase: 2

# ============================================================================
# DATASETS - Phase 2: 4-5 datasets, potentially different modalities
# ============================================================================
datasets:
  # Dataset 1: X-ray (Montgomery CXR)
  - name: "montgomery"
    adapter: "ImageMaskFolderAdapter"
    root: "/path/to/montgomery"
    image_dir: "images"
    mask_dir: "masks"
    image_exts: [".png", ".jpg"]
    mask_exts: [".png"]
    mask:
      type: "binary_0_255"
      class_id: 1

  # Dataset 2: X-ray (JSRT)
  - name: "jsrt"
    adapter: "ImageMaskFolderAdapter"
    root: "/path/to/jsrt"
    image_dir: "images"
    mask_dir: "masks"
    image_exts: [".png"]
    mask_exts: [".png"]
    mask:
      type: "binary_0_255"
      class_id: 1

  # Dataset 3: CT Scan
  - name: "ct_liver"
    adapter: "ImageMaskFolderAdapter"
    root: "/path/to/ct_liver_2d"
    image_dir: "images"
    mask_dir: "masks"
    image_exts: [".png", ".jpg"]
    mask_exts: [".png"]
    mask:
      type: "binary_0_255"
      class_id: 1

  # Dataset 4: Ultrasound
  - name: "ultrasound_breast"
    adapter: "ImageMaskFolderAdapter"
    root: "/path/to/ultrasound_breast"
    image_dir: "images"
    mask_dir: "masks"
    image_exts: [".png", ".jpg"]
    mask_exts: [".png"]
    mask:
      type: "binary_0_255"
      class_id: 1

  # Dataset 5: Dermoscopy
  - name: "dermoscopy"
    adapter: "ImageMaskFolderAdapter"
    root: "/path/to/dermoscopy"
    image_dir: "images"
    mask_dir: "masks"
    image_exts: [".png", ".jpg"]
    mask_exts: [".png"]
    mask:
      type: "binary_0_255"
      class_id: 1

# ============================================================================
# MODELS - Multi-model + Multi-weights
# ============================================================================
models:
  # SAM (Original)
  - name: "SAM"
    runner: "SAM1"
    mode: ["prompt_bbox", "automatic"]
    weights:
      - id: "sam_b"
        checkpoint: "weight/sam_vit_b_01ec64.pth"
        model_type: "vit_b"
      - id: "sam_l"
        checkpoint: "weight/sam_vit_l_0b3195.pth"
        model_type: "vit_l"
      - id: "sam_h"
        checkpoint: "weight/sam_vit_h_4b8939.pth"
        model_type: "vit_h"

  # SAM2
  - name: "SAM2"
    runner: "SAM2"
    mode: ["prompt_bbox", "automatic"]
    weights:
      - id: "sam2_t"
        checkpoint: "weight/sam2_t.pt"
        model_type: "sam2_t"
      - id: "sam2_s"
        checkpoint: "weight/sam2_s.pt"
        model_type: "sam2_s"

  # MedSAM
  - name: "MedSAM"
    runner: "MedSAM"
    mode: ["prompt_bbox"]
    weights:
      - id: "medsam"
        checkpoint: "/path/to/medsam_vit_b.pth"
        model_type: "vit_b"

# ============================================================================
# INFERENCE SETTINGS
# ============================================================================
inference:
  image_rgb: "repeat_gray_3ch"
  prompt:
    default: "BOX_FROM_GT_BBOX"
    # Optional alternatives:
    # - POINTS_FROM_GT
    # - BOX_WITH_MARGIN

# ============================================================================
# NOISE CONFIGURATION
# ============================================================================
noises:
  # Phase 1 required noises
  phase1_required: 
    - "gaussian"
    - "poisson"
    - "salt_pepper"
    - "motion_blur"
    - "bias_field"
    - "low_contrast"
  
  # Phase 2 optional noises (enabled in this config)
  phase2_optional:
    - "speckle"
    - "uniform"
    - "jpeg"
    - "quantization"
    - "defocus_blur"
    - "coarse_dropout"
    - "gridmask"

# ============================================================================
# LEVELS (L0-L4: Clean to Severe)
# ============================================================================
levels:
  names: ["L0", "L1", "L2", "L3", "L4"]

# ============================================================================
# PROTOCOLS
# ============================================================================
protocols:
  # Enable all protocols including grid search for Phase 2
  enabled: ["P0", "P1", "P2", "P3"]
  
  # P1: Coupled presets - p and severity increase together
  coupled_presets:
    # Phase 1 required
    gaussian: 
      L1: {p: 0.3, sigma: 5}
      L2: {p: 0.6, sigma: 10}
      L3: {p: 0.8, sigma: 18}
      L4: {p: 1.0, sigma: 28}
    
    poisson:
      L1: {p: 0.3, lam: 8}
      L2: {p: 0.6, lam: 15}
      L3: {p: 0.8, lam: 25}
      L4: {p: 1.0, lam: 40}
    
    salt_pepper:
      L1: {p: 0.3, amount: 0.005}
      L2: {p: 0.6, amount: 0.01}
      L3: {p: 0.8, amount: 0.02}
      L4: {p: 1.0, amount: 0.04}
    
    motion_blur:
      L1: {p: 0.3, k: 5, angle: 10}
      L2: {p: 0.6, k: 9, angle: 15}
      L3: {p: 0.8, k: 13, angle: 20}
      L4: {p: 1.0, k: 17, angle: 25}
    
    bias_field:
      L1: {p: 0.3, strength: 0.2, smooth: 48}
      L2: {p: 0.6, strength: 0.35, smooth: 64}
      L3: {p: 0.8, strength: 0.55, smooth: 96}
      L4: {p: 1.0, strength: 0.8, smooth: 128}
    
    low_contrast:
      L1: {p: 0.3, alpha: 0.85, beta: 0.0}
      L2: {p: 0.6, alpha: 0.75, beta: 0.0}
      L3: {p: 0.8, alpha: 0.65, beta: 0.0}
      L4: {p: 1.0, alpha: 0.50, beta: 0.0}
    
    # Phase 2 optional
    speckle:
      L1: {p: 0.3, sigma: 0.04}
      L2: {p: 0.6, sigma: 0.08}
      L3: {p: 0.8, sigma: 0.12}
      L4: {p: 1.0, sigma: 0.18}
    
    uniform:
      L1: {p: 0.3, a: -5, b: 5}
      L2: {p: 0.6, a: -10, b: 10}
      L3: {p: 0.8, a: -18, b: 18}
      L4: {p: 1.0, a: -25, b: 25}
    
    jpeg:
      L1: {p: 0.3, quality: 70}
      L2: {p: 0.6, quality: 50}
      L3: {p: 0.8, quality: 30}
      L4: {p: 1.0, quality: 15}
    
    quantization:
      L1: {p: 0.3, step: 4}
      L2: {p: 0.6, step: 8}
      L3: {p: 0.8, step: 16}
      L4: {p: 1.0, step: 32}
    
    defocus_blur:
      L1: {p: 0.3, k: 3}
      L2: {p: 0.6, k: 5}
      L3: {p: 0.8, k: 9}
      L4: {p: 1.0, k: 13}
    
    coarse_dropout:
      L1: {p: 0.3, holes: 4, size: 16}
      L2: {p: 0.6, holes: 8, size: 24}
      L3: {p: 0.8, holes: 12, size: 32}
      L4: {p: 1.0, holes: 16, size: 48}
    
    gridmask:
      L1: {p: 0.3, d: 64, r: 16}
      L2: {p: 0.6, d: 48, r: 16}
      L3: {p: 0.8, d: 32, r: 16}
      L4: {p: 1.0, d: 24, r: 12}

  # P2: OFAT (One-Factor-At-a-Time) settings
  ofat:
    p_fixed: 0.8               # Fixed probability for P2a
    severity_ref_level: "L3"   # Reference severity level for P2b

  # P3: Grid search (enabled for Phase 2)
  grid:
    enabled: true
    p_values: [0.2, 0.5, 0.8]
    severity_levels: ["L1", "L2", "L3"]

  # Mixed noise sets (Phase 2 optional)
  mix_sets:
    enabled: true
    sets:
      acquisition_combo: ["gaussian", "motion_blur"]
      medical_artifacts: ["bias_field", "low_contrast", "poisson"]
      compression_artifacts: ["jpeg", "quantization"]

# ============================================================================
# OUTPUT SETTINGS
# ============================================================================
outputs:
  save_pred_masks: true
  num_preview_samples: 12
  preview_levels: ["L0", "L2", "L4"]
  num_failure_cases: 10
  figures_dpi: 200