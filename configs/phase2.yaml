exp:
  name: "phase2_tn3k_tg3k_multimodel"
  out_root: "outputs"

# ─────────────────────────────────────────────────────────────────────────
#  DEVICE / GPU CONFIGURATION
#  Option 1 – single GPU:     device: "cuda:0"        (or "cuda", "cpu")
#  Option 2 – explicit list:  devices: ["cuda:0", "cuda:1"]
#  Option 3 – auto N GPUs:    num_gpus: 2
#  CLI overrides: --device cuda:1   or   --num_gpus 2
# ─────────────────────────────────────────────────────────────────────────
device: "cpu"
# devices: ["cuda:0", "cuda:1"]   # uncomment for multi-GPU parallel
# num_gpus: 2                      # alternative: auto-pick N GPUs

stage1:
  save_artifacts: true
  artifact_samples_per_case: 3

datasets:
  - name: "TN3K"
    adapter: "ImageMaskFolderAdapter"
    root: "data/Thyroid Dataset/Thyroid Dataset/tn3k"
    image_dir: "trainval-image"
    mask_dir: "trainval-mask"
    sources:
      - name: "trainval"
        image_dir: "trainval-image"
        mask_dir: "trainval-mask"
      - name: "test"
        image_dir: "test-image"
        mask_dir: "test-mask"
    image_exts: [".png", ".jpg", ".jpeg"]
    mask_exts: [".png", ".jpg", ".jpeg"]
    mask:
      type: "binary_0_255"
      class_id: 1

  - name: "TG3K"
    adapter: "ImageMaskFolderAdapter"
    root: "data/Thyroid Dataset/Thyroid Dataset/tg3k"
    image_dir: "thyroid-image"
    mask_dir: "thyroid-mask"
    image_exts: [".png", ".jpg", ".jpeg"]
    mask_exts: [".png", ".jpg", ".jpeg"]
    mask:
      type: "binary_0_255"
      class_id: 1

models:
  - name: "SAM"
    runner: "SAM1"
    prompt_modes: ["prompt_point", "prompt_bbox", "prompt_point_box"]

  - name: "SAM2"
    runner: "SAM2"
    prompt_modes: ["prompt_point", "prompt_bbox", "prompt_point_box"]

  - name: "MedSAM"
    runner: "MEDSAM1"
    prompt_modes: ["prompt_bbox", "prompt_point_box"]

noises:
  - gaussian
  - poisson
  - salt_pepper
  - motion_blur
  - bias_field
  - low_contrast

levels: [L0, L1, L2, L3, L4, L5, L6, L7, L8, L9]

level_names:
  L0: "clean"
  L1: "very mild"
  L2: "mild"
  L3: "moderate"
  L4: "strong"
  L5: "severe"
  L6: "extreme"
  L7: "destructive"
  L8: "near failure"
  L9: "catastrophic"

noise_config:
  base_seed: 42
  n_noise_seeds: 3

protocols:
  coupled_presets:
    gaussian:
      L1: {p: 1, sigma: 3}
      L2: {p: 1, sigma: 6}
      L3: {p: 1, sigma: 10}
      L4: {p: 1, sigma: 14}
      L5: {p: 1, sigma: 18}
      L6: {p: 1, sigma: 24}
      L7: {p: 1, sigma: 30}
      L8: {p: 1, sigma: 38}
      L9: {p: 1, sigma: 48}

    poisson:
      L1: {p: 1, lam: 50}
      L2: {p: 1, lam: 40}
      L3: {p: 1, lam: 32}
      L4: {p: 1, lam: 25}
      L5: {p: 1, lam: 19}
      L6: {p: 1, lam: 14}
      L7: {p: 1, lam: 10}
      L8: {p: 1, lam: 7}
      L9: {p: 1, lam: 4}

    salt_pepper:
      L1: {p: 1, amount: 0.002}
      L2: {p: 1, amount: 0.005}
      L3: {p: 1, amount: 0.008}
      L4: {p: 1, amount: 0.012}
      L5: {p: 1, amount: 0.018}
      L6: {p: 1, amount: 0.026}
      L7: {p: 1, amount: 0.038}
      L8: {p: 1, amount: 0.055}
      L9: {p: 1, amount: 0.080}

    motion_blur:
      L1: {p: 1, k: 3, angle: 15}
      L2: {p: 1, k: 5, angle: 15}
      L3: {p: 1, k: 7, angle: 15}
      L4: {p: 1, k: 9, angle: 15}
      L5: {p: 1, k: 11, angle: 15}
      L6: {p: 1, k: 13, angle: 15}
      L7: {p: 1, k: 17, angle: 15}
      L8: {p: 1, k: 21, angle: 15}
      L9: {p: 1, k: 25, angle: 15}

    bias_field:
      L1: {p: 1, strength: 0.08, smooth: 96}
      L2: {p: 1, strength: 0.15, smooth: 96}
      L3: {p: 1, strength: 0.25, smooth: 96}
      L4: {p: 1, strength: 0.35, smooth: 96}
      L5: {p: 1, strength: 0.45, smooth: 96}
      L6: {p: 1, strength: 0.60, smooth: 96}
      L7: {p: 1, strength: 0.75, smooth: 96}
      L8: {p: 1, strength: 0.90, smooth: 96}
      L9: {p: 1, strength: 1.00, smooth: 96}

    low_contrast:
      L1: {p: 1, alpha: 0.95, beta: 0.0}
      L2: {p: 1, alpha: 0.90, beta: 0.0}
      L3: {p: 1, alpha: 0.82, beta: 0.0}
      L4: {p: 1, alpha: 0.74, beta: 0.0}
      L5: {p: 1, alpha: 0.66, beta: 0.0}
      L6: {p: 1, alpha: 0.58, beta: 0.0}
      L7: {p: 1, alpha: 0.50, beta: 0.0}
      L8: {p: 1, alpha: 0.40, beta: 0.0}
      L9: {p: 1, alpha: 0.30, beta: 0.0}
