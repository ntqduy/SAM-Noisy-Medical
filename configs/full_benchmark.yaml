# =========================================================================
#  Full Benchmark Config
#  All datasets × All models (with available weights)
#  Just run:  python main.py --config configs/full_benchmark.yaml --stage 1
# =========================================================================

exp:
  name: "full_benchmark"
  out_root: "outputs"

# ─────────────────────────────────────────────────────────────────────────
#  DEVICE / GPU CONFIGURATION
#  Option 1 – single GPU:     device: "cuda:0"        (or "cuda", "cpu")
#  Option 2 – explicit list:  devices: ["cuda:0", "cuda:1"]
#  Option 3 – auto N GPUs:    num_gpus: 2
#  CLI overrides: --device cuda:1   or   --num_gpus 2
# ─────────────────────────────────────────────────────────────────────────
device: "cuda:0"
# devices: ["cuda:0", "cuda:1"]   # uncomment for multi-GPU parallel
# num_gpus: 2                      # alternative: auto-pick N GPUs

stage1:
  save_artifacts: true
  artifact_samples_per_case: 3
  cache_noisy_images: true
  noise_cache_dir: "noise_cache"
  clear_noise_cache_on_start: false
  reuse_existing_noisy_images: true
  existing_noisy_root: "outputs/full_benchmark/artifacts/_shared"
  fallback_generate_noise_if_missing: true
  save_pred_masks: true
  save_gt_masks: false
  save_original_images: false
  save_noisy_images: false
  save_relative_paths_only: true
  parallel:
    enabled: true
    num_workers: 4
    mode: "preprocess"
    preserve_order: true
  gc_collect_interval: 0
  cuda_cache_clear_interval: 0

metrics:
  add_hd95: true
  add_physical_distance: true
  spacing_source: "sample_meta"
  fallback_spacing: null
  keep_legacy_hd: true

performance:
  log_inference_time: true
  log_fps: true

prompt_variants:
  enabled: false

  prompt_bbox:
    - name: bbox_gt_5
      type: baseline
      expand: 0.05

    - name: bbox_expand_10
      type: expand
      expand: 0.10

    - name: bbox_expand_20
      type: expand
      expand: 0.20

    - name: bbox_shift_10
      type: translate
      shift_x: [-0.10, 0.10]
      shift_y: [-0.10, 0.10]
      relative_to: bbox_size

    - name: bbox_shrink_10
      type: shrink
      shrink: 0.10
      min_size: 4
      clip_to_image: true

  prompt_point:
    - name: point_center_bbox
      type: bbox_center

    - name: point_centroid
      type: mask_centroid

    - name: point_random_inside
      type: random_inside_mask
      n_random: 1
      seed_mode: deterministic

  prompt_point_box:
    - name: point_centroid_bbox_gt_5
      point_variant: point_centroid
      bbox_variant: bbox_gt_5

# ─────────────────────────────────────────────────────────────────────────
#  DATASETS
# ─────────────────────────────────────────────────────────────────────────
datasets:

  # # 1) Montgomery County X-ray  (138 images)
  - name: "Montgomery"
    adapter: "ImageMaskFolderAdapter"
    root: "data/Montgomery"
    image_dir: "img"
    mask_dir: "mask"
    image_exts: [".png"]
    mask_exts: [".png"]
    mask:
      type: "binary_0_255"
      class_id: 1

  # # 2) BUSI – Breast Ultrasound  (~437 benign+malignant pairs)
  - name: "BUSI"
    adapter: "BUSIAdapter"
    root: "data/BUSI/Dataset_BUSI_with_GT"
    categories: ["benign", "malignant"]
    image_exts: [".png"]

  # # 3) CAMUS – Cardiac Ultrasound  (500 patients × 2 views × 2 phases = ~2000)
  - name: "CAMUS"
    adapter: "CAMUSAdapter"
    root: "data/CAMUS/CAMUS_public/database_nifti"
    views: ["2CH", "4CH"]
    phases: ["ED", "ES"]
    class_id: 1           # LV endocardium (change to 0 for all foreground)
  ## 3.1 Data with CAMUS 2D
  - name: "CAMUS"
    adapter: "ImageMaskFolderAdapter"
    root: "data/CAMUS"
    image_dir: "images"
    mask_dir: "masks"
    image_exts: [".png"]
    mask_exts: [".png"]
    mask:
      type: "binary_0_255"
      threshold: 0

  # # 4) TN3K – Thyroid Nodule  (trainval+test merged = 3493 images)
  - name: "TN3K"
    adapter: "ImageMaskFolderAdapter"
    root: "data/Thyroid Dataset/Thyroid Dataset/tn3k"
    image_dir: "trainval-image"
    mask_dir: "trainval-mask"
    sources:
      - name: "trainval"
        image_dir: "trainval-image"
        mask_dir: "trainval-mask"
      - name: "test"
        image_dir: "test-image"
        mask_dir: "test-mask"
    image_exts: [".png", ".jpg", ".jpeg"]
    mask_exts: [".png", ".jpg", ".jpeg"]
    mask:
      type: "binary_0_255"
      class_id: 1
      threshold: 127

  # # 5) TG3K – Thyroid Gland  (3585 images)
  - name: "TG3K"
    adapter: "ImageMaskFolderAdapter"
    root: "data/Thyroid Dataset/Thyroid Dataset/tg3k"
    image_dir: "thyroid-image"
    mask_dir: "thyroid-mask"
    image_exts: [".png", ".jpg", ".jpeg"]
    mask_exts: [".png", ".jpg", ".jpeg"]
    mask:
      type: "binary_0_255"
      class_id: 1
      threshold: 127

  # 6) DDTI – Digital Database of Thyroid Imaging  (637 images)
  - name: "DDTI"
    adapter: "ImageMaskFolderAdapter"
    root: "data/Thyroid Dataset/Thyroid Dataset/DDTI dataset/DDTI/1_or_data"
    image_dir: "image"
    mask_dir: "mask"
    image_exts: [".png", ".PNG"]
    mask_exts: [".png", ".PNG"]
    mask:
      type: "binary_0_255"
      class_id: 1

# ─────────────────────────────────────────────────────────────────────────
#  MODELS  (only models with available weights)
# ─────────────────────────────────────────────────────────────────────────
models:

  - name: "SAM"
    runner: "SAM1"
    checkpoint: "weights/sam_b.pt"
    prompt_modes: ["prompt_point", "prompt_bbox", "prompt_point_box"]

  - name: "SAM2"
    runner: "SAM2"
    checkpoint: "weights/sam2_b.pt"
    config: "configs/sam2/sam2_hiera_b+.yaml"
    prompt_modes: ["prompt_point", "prompt_bbox", "prompt_point_box"]

  - name: "SAM3"
    runner: "SAM3"
    checkpoint: "weights/sam3.pt"
    prompt_modes: ["prompt_point", "prompt_bbox", "prompt_point_box"]

  - name: "MedSAM"
    runner: "MEDSAM1"
    checkpoint: "weights/medsam_vit_b.pth"
    point_logit_threshold: -1.2
    # Original MedSAM is box-prompt native in this benchmark.
    prompt_modes: ["prompt_point", "prompt_bbox", "prompt_point_box"]

  - name: "MedicoSAM"
    runner: "MEDICOSAM"
    checkpoint: "weights/vit_b_medicosam.pt"
    model_type: "vit_b"
    prompt_modes: ["prompt_point", "prompt_bbox", "prompt_point_box"]

  # MedSAM2 – MedSAM built on SAM2 backbone
  - name: "MedSAM2"
    runner: "MEDSAM2"
    checkpoint: "weights/MedSAM2/MedSAM2_latest.pt"
    config: "sam2.1_hiera_t512.yaml"
    prompt_modes: ["prompt_point", "prompt_bbox", "prompt_point_box"]

  # MedSAM3 – LoRA fine-tuned on SAM3 base
  # Note: Uses SAM3 base weights (weights/sam3.pt) + LoRA adapter
  - name: "MedSAM3"
    runner: "MEDSAM3"
    checkpoint: "weights/sam3.pt"
    lora_weights: "weights/MedSAM3/best_lora_weights.pt"
    prompt_modes: ["prompt_point", "prompt_bbox", "prompt_point_box"]

  # SAM-Med2D – SAM fine-tuned on large-scale medical 2D dataset
  - name: "SAM-Med2D"
    runner: "SAM-MED2D"
    checkpoint: "weights/sam-med2d_b.pth"
    prompt_modes: ["prompt_point", "prompt_bbox", "prompt_point_box"]

  - name: "UltraSAM"
    runner: "ULTRASAM"
    checkpoint: "weights/UltraSam.pth"
    prompt_modes: ["prompt_point","prompt_bbox","prompt_point_box"]
    config: "models/external/UltraSam/configs/UltraSAM/UltraSAM_full/UltraSAM_box_refine.py"
    # Optional mode-specific configs for fair prompt-mode benchmarking:
    # - point uses point-refine config
    # - bbox keeps box-refine config
    # - point+box can be chosen explicitly (defaults to `config` if omitted)
    config_point: "models/external/UltraSam/configs/UltraSAM/UltraSAM_full/UltraSAM_point_refine.py"
    config_bbox: "models/external/UltraSam/configs/UltraSAM/UltraSAM_full/UltraSAM_box_refine.py"
    config_point_box: "models/external/UltraSam/configs/UltraSAM/UltraSAM_full/UltraSAM_box_refine.py"
    force_box_for_point: false
    point_box_fusion: "best_score"

# ─────────────────────────────────────────────────────────────────────────
#  NOISE TYPES & LEVELS
# ─────────────────────────────────────────────────────────────────────────
noises:
  - gaussian
  - speckle
  - salt_pepper
  - motion_blur
  - jpeg
  - pixelation
  - low_brightness
  - high_brightness
  - low_contrast
  - high_contrast
  - rician
  - poisson

  # - bias_field
levels: [L0, L1, L2, L3, L4, L5, L6, L7, L8, L9]

level_names:
  L0: "clean"
  L1: "very mild"
  L2: "mild"
  L3: "moderate"
  L4: "strong"
  L5: "severe"
  L6: "extreme"
  L7: "destructive"
  L8: "near failure"
  L9: "catastrophic"

noise_config:
  base_seed: 42
  n_noise_seeds: 1

# ─────────────────────────────────────────────────────────────────────────
#  NOISE PRESETS  (coupled_presets: L1–L9 for each noise type)
# ─────────────────────────────────────────────────────────────────────────
protocols:
  coupled_presets:
    gaussian:
      L1: {p: 1, sigma: 5}
      L2: {p: 1, sigma: 10}
      L3: {p: 1, sigma: 20}
      L4: {p: 1, sigma: 30}
      L5: {p: 1, sigma: 40}
      L6: {p: 1, sigma: 50}
      L7: {p: 1, sigma: 60}
      L8: {p: 1, sigma: 70}
      L9: {p: 1, sigma: 80}

    speckle:
      L1: {p: 1, sigma: 0.05}
      L2: {p: 1, sigma: 0.1}
      L3: {p: 1, sigma: 0.2}
      L4: {p: 1, sigma: 0.3}
      L5: {p: 1, sigma: 0.45}
      L6: {p: 1, sigma: 0.55}
      L7: {p: 1, sigma: 0.65}
      L8: {p: 1, sigma: 0.75}
      L9: {p: 1, sigma: 0.9}

    salt_pepper:
      L1: {p: 1, amount: 0.01}
      L2: {p: 1, amount: 0.03}
      L3: {p: 1, amount: 0.05}
      L4: {p: 1, amount: 0.08}
      L5: {p: 1, amount: 0.1}
      L6: {p: 1, amount: 0.15}
      L7: {p: 1, amount: 0.25}
      L8: {p: 1, amount: 0.35}
      L9: {p: 1, amount: 0.5}

    motion_blur:
      L1: {p: 1, k: 3, angle: 15}
      L2: {p: 1, k: 5, angle: 15}
      L3: {p: 1, k: 7, angle: 15}
      L4: {p: 1, k: 9, angle: 15}
      L5: {p: 1, k: 12, angle: 15}
      L6: {p: 1, k: 15, angle: 15}
      L7: {p: 1, k: 18, angle: 15}
      L8: {p: 1, k: 25, angle: 15}
      L9: {p: 1, k: 40, angle: 15}
    jpeg:
      L1: {p: 1, quality: 90}
      L2: {p: 1, quality: 80}
      L3: {p: 1, quality: 70}
      L4: {p: 1, quality: 60}
      L5: {p: 1, quality: 50}
      L6: {p: 1, quality: 40}
      L7: {p: 1, quality: 30}
      L8: {p: 1, quality: 15}
      L9: {p: 1, quality: 5}
    
    pixelation:
      L1: {p: 1, block_size: 2}
      L2: {p: 1, block_size: 4}
      L3: {p: 1, block_size: 8}
      L4: {p: 1, block_size: 16}
      L5: {p: 1, block_size: 20}
      L6: {p: 1, block_size: 24}
      L7: {p: 1, block_size: 32}
      L8: {p: 1, block_size: 40}
      L9: {p: 1, block_size: 50}
    low_brightness:
      L1: {p: 1, factor: 0.98}
      L2: {p: 1, factor: 0.95}
      L3: {p: 1, factor: 0.8}
      L4: {p: 1, factor: 0.6}
      L5: {p: 1, factor: 0.4}
      L6: {p: 1, factor: 0.25}
      L7: {p: 1, factor: 0.15}
      L8: {p: 1, factor: 0.1}
      L9: {p: 1, factor: 0.05}

    high_brightness:
      L1: {p: 1, factor: 1.05}
      L2: {p: 1, factor: 1.2}
      L3: {p: 1, factor: 1.4}
      L4: {p: 1, factor: 1.70}
      L5: {p: 1, factor: 2.0}
      L6: {p: 1, factor: 2.50}
      L7: {p: 1, factor: 3.0}
      L8: {p: 1, factor: 4.0}
      L9: {p: 1, factor: 5.0}
    low_contrast:
      L1: {p: 1, alpha: 0.98, beta: 0.0}
      L2: {p: 1, alpha: 0.95, beta: 0.0}
      L3: {p: 1, alpha: 0.9, beta: 0.0}
      L4: {p: 1, alpha: 0.8, beta: 0.0}
      L5: {p: 1, alpha: 0.7, beta: 0.0}
      L6: {p: 1, alpha: 0.5, beta: 0.0}
      L7: {p: 1, alpha: 0.35, beta: 0.0}
      L8: {p: 1, alpha: 0.2, beta: 0.0}
      L9: {p: 1, alpha: 0.1, beta: 0.0}

    high_contrast:
      L1: {p: 1, factor: 1.5}
      L2: {p: 1, factor: 2.0}
      L3: {p: 1, factor: 2.50}
      L4: {p: 1, factor: 3.0}
      L5: {p: 1, factor: 4.0}
      L6: {p: 1, factor: 4.5}
      L7: {p: 1, factor: 5.5}
      L8: {p: 1, factor: 6.5}
      L9: {p: 1, factor: 8.0}
    rician:
        L1: {p: 1, sigma: 5}
        L2: {p: 1, sigma: 10}
        L3: {p: 1, sigma: 15}
        L4: {p: 1, sigma: 20}
        L5: {p: 1, sigma: 30}
        L6: {p: 1, sigma: 40}
        L7: {p: 1, sigma: 50}
        L8: {p: 1, sigma: 60}
        L9: {p: 1, sigma: 75}




    poisson:
      L1: {p: 1, lam: 80}
      L2: {p: 1, lam: 60}
      L3: {p: 1, lam: 50}
      L4: {p: 1, lam: 30}
      L5: {p: 1, lam: 20}
      L6: {p: 1, lam: 14}
      L7: {p: 1, lam: 10}
      L8: {p: 1, lam: 7}
      L9: {p: 1, lam: 4}
    # bias_field:
    #   L1: {p: 1, strength: 0.08, smooth: 96}
    #   L2: {p: 1, strength: 0.15, smooth: 96}
    #   L3: {p: 1, strength: 0.25, smooth: 96}
    #   L4: {p: 1, strength: 0.35, smooth: 96}
    #   L5: {p: 1, strength: 0.45, smooth: 96}
    #   L6: {p: 1, strength: 0.60, smooth: 96}
    #   L7: {p: 1, strength: 0.75, smooth: 96}
    #   L8: {p: 1, strength: 1.0, smooth: 96}
    #   L9: {p: 1, strength: 1.25, smooth: 96}
